<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">
    <title>Google</title>
    <link href="./style.css" rel="stylesheet" type="text/css" />
    <script src="https://kit.fontawesome.com/dab690a483.js" crossorigin="anonymous"></script>
</head>

<body>
    <div class="navbar">
        <a href="#" class="nav-item">Gmail</a>
        <a href="#" class="nav-item">이미지</a>
        <i class="fas fa-bars"></i>
    </div>

    <div class="main">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/6e/Google_Name.svg" width="272" />
        
        <div class="input-area">
            <i class="fas fa-plus left-icon"></i>
            <input type="text" class="input-box" />
            <i class="fas fa-keyboard keyboard-icon"></i>
            <i class="fas fa-microphone mic-icon"></i>
            <i class="fas fa-camera camera-icon"></i>
            <button class="ai-button">
                <i class="fas fa-search"></i> AI 모드
            </button>
        </div>

        <div class="button-area">
            <button class="button-style">Google 검색</button>
            <button class="button-style">I'm feeling lucky</button>
        </div>
        <div class="language-area">
            Google 지원 언어 : 
            <a href="#" class="language">English</a>
        </div>
    </div>

    <div class="footer">
      
        <div class="second-line">
            <span>
                <a href="#">Google 정보</a>
                <a href="#">광고</a>
                <a href="#">비즈니스</a>
                <a href="#">검색의 원리</a>
            </span>

            <span class="second-line-second">
                <a href="#">개인정보처리방침</a>
                <a href="#">약관</a>
                <a href="#">설정</a>
            </span>
        </div>
    </div>
</body>

</html>
