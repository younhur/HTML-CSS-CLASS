<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>CSS Layout Challenges</title>
  </head>
  <body>

    <h2>Challenge 1 — justify-content: space-between</h2>
    <div class="main challenge1">
      <div class="box">div1</div>
      <div class="sub-main">
        <div class="box mr-5">div2</div>
        <div class="box">div3</div>
      </div>
    </div>

    <h2>Challenge 2 — flex-direction: column</h2>
    <div class="main challenge2">
      <div class="box">div1</div>
      <div class="box ml-250">div2</div>
      <div class="box ml-500">div3</div>
    </div>

    <h2>Challenge 3 — justify-content: center</h2>
    <div class="main challenge3">
      <div class="outer-box">div1
        <div class="box">div2</div>
      </div>
    </div>

    <h2>Challenge 4 — position: relative</h2>
    <div class="main challenge4">
      <div class="box">div1</div>
      <div class="box box-gray relative-box">div2</div>
    </div>

    <h2>Challenge 5 — position: absolute</h2>
    <div class="main challenge5">
      <div class="parent-box">div1
        <div class="box abs-box2">div2</div>
        <div class="box abs-box3">div3</div>
      </div>
    </div>

  </body>
</html>
